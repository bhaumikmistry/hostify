name: Validate Submission

on:
  pull_request:
    paths:
      - 'submissions/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep '^submissions/' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate structure
        id: structure
        run: |
          ERRORS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if ! echo "$file" | grep -qE '^submissions/[a-z0-9-]+/[a-z0-9-]+/index\.html$'; then
              ERRORS="${ERRORS}Invalid path: \`$file\` (must be \`submissions/<username>/<title>/index.html\`, lowercase alphanumeric and hyphens only)\n"
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          if [ -n "$ERRORS" ]; then
            echo "errors<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Check file size
        id: size
        if: always() && steps.changed.outcome == 'success'
        run: |
          MAX_SIZE=512000
          ERRORS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
            if [ "$size" -gt "$MAX_SIZE" ]; then
              ERRORS="${ERRORS}\`$file\` exceeds 500KB limit (${size} bytes)\n"
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          if [ -n "$ERRORS" ]; then
            echo "errors<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Scan for malicious patterns
        id: security
        if: always() && steps.changed.outcome == 'success'
        run: |
          ERRORS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            if grep -qi '<iframe' "$file"; then
              ERRORS="${ERRORS}\`$file\`: contains iframe elements\n"
            fi

            if grep -qiE 'action\s*=\s*["'"'"']https?://' "$file"; then
              ERRORS="${ERRORS}\`$file\`: form with external action\n"
            fi

            if grep -qiE 'coinhive|cryptonight|coinlmp|minero|miner\.start' "$file"; then
              ERRORS="${ERRORS}\`$file\`: suspected crypto mining code\n"
            fi

            if grep -qiE 'meta[^>]+http-equiv\s*=\s*["'"'"']refresh' "$file"; then
              ERRORS="${ERRORS}\`$file\`: meta refresh redirect\n"
            fi

            if grep -qiE 'window\.location\s*[=.]|document\.location\s*[=.]|location\.href\s*=' "$file"; then
              ERRORS="${ERRORS}\`$file\`: JavaScript redirect\n"
            fi

          done <<< "${{ steps.changed.outputs.files }}"
          if [ -n "$ERRORS" ]; then
            echo "errors<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Comment on PR — passed
        if: success()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<'EOF'
          ✅ **Validation passed**

          All checks passed — this submission is ready for merge.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR — failed
        if: failure()
        run: |
          BODY="❌ **Validation failed**\n\n"
          if [ -n "${{ steps.structure.outputs.errors }}" ]; then
            BODY="${BODY}### Structure\n${{ steps.structure.outputs.errors }}\n"
          fi
          if [ -n "${{ steps.size.outputs.errors }}" ]; then
            BODY="${BODY}### File Size\n${{ steps.size.outputs.errors }}\n"
          fi
          if [ -n "${{ steps.security.outputs.errors }}" ]; then
            BODY="${BODY}### Security\n${{ steps.security.outputs.errors }}\n"
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body "$(echo -e "$BODY")"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
