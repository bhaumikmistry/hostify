<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            text-align: center;
            padding: 2rem;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        p { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello, Hostify!</h1>
        <p>A simple page that should pass all validation checks.</p>
    </div>
</body>
</html>
