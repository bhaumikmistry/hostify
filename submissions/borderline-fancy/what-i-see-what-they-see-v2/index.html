<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inception Beach</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0a0a; font-family: system-ui, sans-serif; overscroll-behavior: none; touch-action: none; -webkit-overflow-scrolling: auto; position: fixed; width: 100%; }
        .slide { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding-top: 60px; padding-bottom: 120px; }
        .slide img { width: 65vmin; height: 65vmin; object-fit: cover; border-radius: 4px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        @media (max-width: 600px) { .slide { padding-top: 50px; padding-bottom: 130px; } .slide img { width: 80vw; height: 80vw; max-height: calc(100vh - 200px); max-width: calc(100vh - 200px); } }
        .top-bar { position: fixed; top: 16px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100; }
        .project-title { color: rgba(255,255,255,0.3); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .caption { color: rgba(255,255,255,0.5); font-size: 0.75rem; transition: opacity 0.3s; }
        @media (max-width: 600px) { .top-bar { top: 12px; padding: 0 16px; } .caption { font-size: 0.65rem; } .project-title { font-size: 0.6rem; } }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 12px; z-index: 100; }
        .mode-controls { display: flex; gap: 8px; margin-bottom: 10px; }
        .mode-controls button { padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
        .mode-controls button:hover { background: rgba(255,255,255,0.15); }
        .mode-controls button.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.9); }
        @media (max-width: 600px) { .mode-controls button { padding: 6px 12px; font-size: 0.7rem; } }
        .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
        @media (max-width: 600px) { .controls { gap: 12px; } }
        .controls button { width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s; }
        .controls button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
        .controls button:disabled { opacity: 0.3; cursor: default; }
        .controls .dots { display: flex; gap: 8px; }
        .controls .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.3s, transform 0.3s; cursor: pointer; }
        .controls .dot.active { background: rgba(255,255,255,0.8); transform: scale(1.3); }
        .info { color: rgba(255,255,255,0.3); font-size: 0.6rem; line-height: 1.5; text-align: center; }
        @media (max-width: 600px) { .info { font-size: 0.55rem; } }
    </style>
</head>

    <div class="top-bar"><div class="project-title">what I see, what they see</div><div class="caption" id="caption">The subject</div></div>
    <div class="bottom-bar">
        <div class="mode-controls"><button id="btn-outward" class="active">outward</button><button id="btn-inward">inward</button></div>
        <div class="controls"><button id="prev-btn">&#8592;</button><div class="dots"><div class="dot active" data-i="0"></div><div class="dot" data-i="1"></div><div class="dot" data-i="2"></div></div><button id="next-btn">&#8594;</button></div>

    </div>
    <script>
        document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
        const slides=document.querySelectorAll('.slide'),caption=document.getElementById('caption'),dots=document.querySelectorAll('.dot'),prevBtn=document.getElementById('prev-btn'),nextBtn=document.getElementById('next-btn'),btnOutward=document.getElementById('btn-outward'),btnInward=document.getElementById('btn-inward');
        const captions=['The subject','The photographer','The bigger picture'];
        const phoneOn16={x:0.549,y:0.378},phoneOn17={x:0.354,y:0.884};
        let mode='outward';
        const SCROLL_PER_TRANSITION=2000;
        let scrollPos=0;const maxScroll=(slides.length-1)*SCROLL_PER_TRANSITION;let lastTouchY=0;
        function render(){const imgSize=slides[0].querySelector('img').offsetWidth||500;if(mode==='outward'){renderOutward(imgSize)}else{renderInward(imgSize)}const activeIndex=Math.min(Math.round(scrollPos/SCROLL_PER_TRANSITION),slides.length-1);const captionIndex=mode==='outward'?activeIndex:(slides.length-1-activeIndex);caption.textContent=captions[captionIndex];dots.forEach((d,i)=>d.classList.toggle('active',i===activeIndex));prevBtn.disabled=scrollPos<=0;nextBtn.disabled=scrollPos>=maxScroll}
        function renderOutward(imgSize){const origins=[phoneOn16,phoneOn17];slides.forEach((slide,i)=>{if(i===slides.length-1){slide.style.transform='';slide.style.opacity='1';slide.style.zIndex='1'}else{const transitionStart=i*SCROLL_PER_TRANSITION;const p=Math.max(0,Math.min(1,(scrollPos-transitionStart)/SCROLL_PER_TRANSITION));if(p<=0){slide.style.transform='';slide.style.opacity='1';slide.style.zIndex=''+(10-i)}else if(p>=1){slide.style.opacity='0';slide.style.zIndex='0'}else{const target=origins[i];const targetScale=0.02;const scale=1-p*(1-targetScale);const offsetX=(target.x-0.5)*imgSize*p;const offsetY=(target.y-0.5)*imgSize*p;slide.style.transform='translate('+offsetX+'px,'+offsetY+'px) scale('+scale+')';slide.style.opacity=p<0.9?'1':''+(1-p)/0.1;slide.style.zIndex=''+(10-i)}}})}
        function renderInward(imgSize){const origins=[phoneOn17,phoneOn16];slides[2].style.transform='';slides[2].style.opacity='1';slides[2].style.zIndex='1';const p1=Math.max(0,Math.min(1,scrollPos/SCROLL_PER_TRANSITION));if(p1<=0){slides[1].style.transform='translate('+((origins[0].x-0.5)*imgSize)+'px,'+((origins[0].y-0.5)*imgSize)+'px) scale(0.01)';slides[1].style.opacity='0';slides[1].style.zIndex='2'}else{const scale=p1;const offsetX=(origins[0].x-0.5)*imgSize*(1-p1);const offsetY=(origins[0].y-0.5)*imgSize*(1-p1);slides[1].style.transform='translate('+offsetX+'px,'+offsetY+'px) scale('+scale+')';slides[1].style.opacity='1';slides[1].style.zIndex='2'}const p2=Math.max(0,Math.min(1,(scrollPos-SCROLL_PER_TRANSITION)/SCROLL_PER_TRANSITION));if(p2<=0){slides[0].style.transform='translate('+((origins[1].x-0.5)*imgSize)+'px,'+((origins[1].y-0.5)*imgSize)+'px) scale(0.01)';slides[0].style.opacity='0';slides[0].style.zIndex='3'}else{const scale=p2;const offsetX=(origins[1].x-0.5)*imgSize*(1-p2);const offsetY=(origins[1].y-0.5)*imgSize*(1-p2);slides[0].style.transform='translate('+offsetX+'px,'+offsetY+'px) scale('+scale+')';slides[0].style.opacity='1';slides[0].style.zIndex='3'}}
        function setMode(m){mode=m;scrollPos=0;btnOutward.classList.toggle('active',mode==='outward');btnInward.classList.toggle('active',mode==='inward');render()}
        function goToSlide(index){const target=index*SCROLL_PER_TRANSITION,start=scrollPos,diff=target-start,duration=600,startTime=performance.now();function animate(now){const elapsed=now-startTime,t=Math.min(1,elapsed/duration),ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;scrollPos=start+diff*ease;render();if(t<1)requestAnimationFrame(animate)}requestAnimationFrame(animate)}
        window.addEventListener('wheel',function(e){e.preventDefault();scrollPos=Math.max(0,Math.min(maxScroll,scrollPos+e.deltaY));render()},{passive:false});
        window.addEventListener('touchstart',function(e){lastTouchY=e.touches[0].clientY},{passive:false});
        window.addEventListener('touchmove',function(e){e.preventDefault();const currentY=e.touches[0].clientY;const delta=(lastTouchY-currentY)*3;lastTouchY=currentY;scrollPos=Math.max(0,Math.min(maxScroll,scrollPos+delta));render()},{passive:false});
        prevBtn.addEventListener('click',function(){const c=Math.round(scrollPos/SCROLL_PER_TRANSITION);goToSlide(Math.max(0,c-1))});
        nextBtn.addEventListener('click',function(){const c=Math.round(scrollPos/SCROLL_PER_TRANSITION);goToSlide(Math.min(slides.length-1,c+1))});
        dots.forEach(function(dot){dot.addEventListener('click',function(){goToSlide(parseInt(dot.dataset.i))})});
        btnOutward.addEventListener('click',function(){setMode('outward')});
        btnInward.addEventListener('click',function(){setMode('inward')});
        window.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();const c=Math.round(scrollPos/SCROLL_PER_TRANSITION);goToSlide(Math.min(slides.length-1,c+1))}if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();const c=Math.round(scrollPos/SCROLL_PER_TRANSITION);goToSlide(Math.max(0,c-1))}});
        render();
    </script>
